<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Settimanale - ale_postaggio</title>
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --card: #f3f4f6; }
        @media (prefers-color-scheme: dark) { :root { --bg: #121212; --text: #e5e7eb; --card: #1e1e1e; } }
        body { font-family: sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 95%; max-width: 900px; margin: 40px 0; text-align: center; }
        .image-card { background-color: var(--card); padding: 15px; border-radius: 12px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        img { max-width: 100%; height: auto; border-radius: 8px; display: block; margin: 0 auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Schedule Settimanale</h1>
        <p>ale_postaggio</p>
        <div class="image-card">
            <img id="img" src="" alt="Caricamento orario...">
        </div>
    </div>
    <script>
        // Carichiamo l'immagine aggiungendo un numero casuale alla fine (?t=...)
        // Questo serve a "fregare" il browser e costringerlo a scaricare l'immagine nuova
        document.getElementById('img').src = "schedule.jpg?t=" + new Date().getTime();
    </script>
</body>
</html>
