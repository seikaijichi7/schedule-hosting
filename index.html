<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule Settimanale - Ale Postaggio</title>
    <style>
        :root {
            --bg-color: #ffffff; 
            --text-color: #1a1a1a;
            --card-bg: #f3f4f6;
            --accent: #007bff;
        }
        /* Modalità Dark Automatica */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e5e7eb;
                --card-bg: #1e1e1e;
                --accent: #3b82f6;
            }
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            transition: 0.3s;
        }
        .container {
            width: 95%;
            max-width: 900px;
            margin: 40px 0;
            text-align: center;
        }
        .image-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 0 auto;
        }
        .debug-info {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
            padding: 10px;
            border: 1px dashed #444;
            border-radius: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Schedule Settimanale</h1>
        <p>Ale Postaggio</p>

        <div class="image-card">
            <img id="schedule-img" src="" alt="Caricamento orario...">
        </div>

        <div class="debug-info">
            <strong>URL Immagine:</strong> <span id="debug-url"></span>
        </div>
    </div>

    <script>
        // SOSTITUISCI QUESTO ID CON IL TUO FILE_ID DI DRIVE
        const FILE_ID = "11i1M8N80GFCaoS2apXLnnGsC14j4yUCK"; 
        
        // Generiamo l'URL diretto con cache-busting (per forzare l'aggiornamento)
        const directUrl = `https://drive.google.com/thumbnail?id=${FILE_ID}&t=${new Date().getTime()}`;
        
        // Applichiamo l'immagine e mostriamo l'URL per debug
        document.getElementById('schedule-img').src = directUrl;
        document.getElementById('debug-url').innerText = directUrl;
    </script>
</body>
</html>
